name: Validate skins

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate every palette.json
        run: python3 scripts/validate.py
