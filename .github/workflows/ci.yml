name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS deployment target stays macOS 13 (set in Package.swift +
        # Info.plist). The runner just needs to be ≥ 13 with full Xcode.
        # GitHub's macos-13 runner pool is being retired and queues for
        # 30+ min — macos-14 covers the same Swift toolchain and SDK on
        # Apple Silicon, so a single-row matrix is enough.
        os: [macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test --parallel

  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint install.sh
        run: shellcheck install.sh
