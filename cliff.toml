# git-cliff config — generate CHANGELOG.md from conventional commits.
# Usage:
#   git cliff -o CHANGELOG.md                 # full history
#   git cliff --tag v3.1.0 -o CHANGELOG.md    # treat HEAD as next tag
#   git cliff --unreleased                    # preview the next entry

[changelog]
header = """
# Changelog

All notable changes to ClaudePet land here. Format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and
[Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first }}\
        {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
"""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat",  group = "Added"      },
    { message = "^fix",   group = "Fixed"      },
    { message = "^docs",  group = "Docs"       },
    { message = "^test",  group = "Tests"      },
    { message = "^ci",    group = "CI"         },
    { message = "^chore", group = "Chore"      },
    { message = "^perf",  group = "Performance"},
    { message = "^refactor", group = "Refactor"},
]
filter_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
